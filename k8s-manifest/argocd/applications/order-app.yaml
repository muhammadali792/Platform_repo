apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: order=351849325312.dkr.ecr.eu-north-1.amazonaws.com/order-repo
    argocd-image-updater.argoproj.io/order.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/order.helm.image-name: image.name
    argocd-image-updater.argoproj.io/order.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: https://github.com/muhammadali792/Platform_repo
    targetRevision: main
    path: k8s-manifest/helm/microservice
    helm:
      valueFiles:
      - ../services/order-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: order
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true 
