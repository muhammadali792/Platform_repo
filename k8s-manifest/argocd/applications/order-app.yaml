apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/muhammadali792/Platform_repo
    targetRevision: main
    path: k8s-manifest/helm/microservice
    helm:
      valueFiles:
      - ../services/order-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: order
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true 
