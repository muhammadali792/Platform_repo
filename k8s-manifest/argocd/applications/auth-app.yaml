apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >
      auth=351849325312.dkr.ecr.eu-north-1.amazonaws.com/auth-service
    argocd-image-updater.argoproj.io/auth.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/auth.helm.image-name: image.name
    argocd-image-updater.argoproj.io/auth.helm.image-tag: image.tag
spec:
  project: default
  source:
    repoURL: https://github.com/myorg/k8s-configs-repo
    targetRevision: main
    path: helm/microservice
    helm:
      valueFiles:
      - ../services/auth-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
