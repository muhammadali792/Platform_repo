name: "EKS Infrastructure APPLY"
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
defaults:
  run:
    working-directory: ./Terraform
jobs:
  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="key=cloudaura/terraform.tfstate" -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name ${{ vars.CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      - name: Force Refresh NGINX Pods
        run: |
          # Yeh command un jobs ko delete karegi jo pending hain, 
          # taake naye tolerations ke sath dobara schedule ho sakein.
          kubectl delete job -n ingress-nginx -l app.kubernetes.io/instance=ingress-nginx --ignore-not-found
          kubectl delete pods -n ingress-nginx -l app.kubernetes.io/instance=ingress-nginx
