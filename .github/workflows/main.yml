name: "EKS Infrastructure Destroy"

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  terraform_destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=my-cloudaura-production-bucket" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform Destroy (Workloads First)
        run: |
          terraform destroy \
            -target=helm_release.argo_cd \
            -target=helm_release.argo_rollouts \
            -target=helm_release.kube_prometheus_stack \
            -auto-approve

      - name: Terraform Destroy (Full Infrastructure)
        run: |
          terraform destroy -auto-approve
