name: "EKS Infrastructure Build"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Handle Stale Locks and Imports
        run: |
          # 1. Force Unlock (agar purana lock phans gaya ho)
          terraform force-unlock -force || echo "No lock to remove"
          
          # 2. Conditional Import (agar resource state mein na ho)
          if ! terraform state show 'module.eks.aws_eks_addon.this["aws-ebs-csi-driver"]' > /dev/null 2>&1; then
            echo "Resource not in state. Importing aws-ebs-csi-driver..."
            terraform import 'module.eks.aws_eks_addon.this["aws-ebs-csi-driver"]' cloudaura-eks-cluster:aws-ebs-csi-driver
          else
            echo "aws-ebs-csi-driver already exists in Terraform state. Skipping import."
          fi

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
