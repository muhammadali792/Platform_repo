name: "EKS Infrastructure Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

# 🟢 GLOBAL FIX: Ab saare steps automatic aapke "Terraform" folder ke andar chalenge
defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"
          terraform_wrapper: false # Wrapper band taake binary directly execute ho

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      # 🟢 NEW STEP: Existing resources ko State mein import karne ke liye
      - name: Terraform Import Existing Resources
        run: |
          echo "Importing KMS Alias..."
          terraform import 'module.eks.module.kms.aws_kms_alias.this["cluster"]' alias/eks/cloudaura-eks-cluster || true
          
          echo "Importing CloudWatch Log Group..."
          terraform import 'module.eks.aws_cloudwatch_log_group.this[0]' /aws/eks/cloudaura-eks-cluster/cluster || true

      - name: Terraform Apply (Route53 Zone First)
        run: terraform apply -auto-approve
