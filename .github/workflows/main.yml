name: "EKS Infrastructure DESTROY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Handle Stale Locks and Imports
        run: |
          # 1. Force Unlock (agar purana lock phans gaya ho)
          terraform force-unlock -force || echo "No lock to remove"

          # 2. Import KMS Alias
          terraform state list | grep 'module.eks.module.kms.aws_kms_alias.this\["cluster"\]' || \
          terraform import "module.eks.module.kms.aws_kms_alias.this[\"cluster\"]" "alias/eks/cloudaura-eks-cluster"

          # 3. Import EBS CSI Add-on
          terraform state list | grep 'module.eks.aws_eks_addon.this\["aws-ebs-csi-driver"\]' || \
          terraform import "module.eks.aws_eks_addon.this[\"aws-ebs-csi-driver\"]" cloudaura-eks-cluster:aws-ebs-csi-driver

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
