name: 'Destroy Infrastructure'

on:
  push:
    branches:
      - main

jobs:
  destroy:
    name: 'Destroy Infrastructure'
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC ke liye bahut zaroori hai
      contents: read     # Code checkout ke liye
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
          -backend-config="key=${{ env.TF_STATE_KEY }}" \
          -backend-config="region=${{ env.AWS_REGION }}"

    - name: Pre-destroy Cleanup (CRDs)
      run: |
        # Cluster access setup (Kubeconfig generate karein)
        aws eks update-kubeconfig --name <AAPKA-CLUSTER-NAAM> --region ${{ env.AWS_REGION }}
        # CRDs ko delete karein taake terraform resources saaf delete ho sakein
        kubectl delete crd --all --ignore-not-found=true

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
