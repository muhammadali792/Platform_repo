name: "EKS Infrastructure Build"

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_destroy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Setup Kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Handle Stale Locks and Imports
        run: |
          # 1. Force Unlock (agar purana lock phans gaya ho)
          terraform force-unlock -force || echo "No lock to remove"
           # 2. Import existing resources
          terraform import 'aws_secretsmanager_secret.service_secrets["product"]' product-service/secrets || echo "Already in state"
          
          terraform import aws_elasticache_subnet_group.main main-redis-subnet-group || echo "Already in state"
          terraform import aws_db_subnet_group.main main-db-subnet-group || echo "Already in state"

      - name: Terraform Apply
        run: terraform apply -auto-approve
