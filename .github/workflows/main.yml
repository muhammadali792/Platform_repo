name: "EKS Infrastructure Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Force Clean S3 Native Lockfile
        run: |
          aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/cloudaura/terraform.tfstate.lockfile || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Reset Stuck Helm Releases
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name cloudaura-eks-clusterv2
          helm rollback karpenter -n karpenter || helm uninstall karpenter -n karpenter || true
          helm rollback cert-manager -n cert-manager || helm uninstall cert-manager -n cert-manager || true
          helm rollback ingress-nginx -n ingress-nginx || helm uninstall ingress-nginx -n ingress-nginx || true

      - name: Import Existing Resources
        run: |
          terraform import aws_eks_addon.ebs_csi cloudaura-eks-clusterv2:aws-ebs-csi-driver || true
          terraform import helm_release.karpenter karpenter/karpenter || true
          terraform import helm_release.cert_manager cert-manager/cert-manager || true
          terraform import 'module.eks_addons.module.ingress_nginx.helm_release.this[0]' ingress-nginx/ingress-nginx || true
          terraform import 'module.eks_addons.module.kube_prometheus_stack.helm_release.this[0]' kube-prometheus-stack/kube-prometheus-stack || true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve
