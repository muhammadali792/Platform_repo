name: "EKS Infrastructure Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Force Clean S3 Native Lockfile
        run: aws s3 rm s3://${{ vars.TF_STATE_BUCKET }}/cloudaura/terraform.tfstate.lockfile || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="key=cloudaura/terraform.tfstate" -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Phase 1 — Security Group
        run: terraform apply -target=security.tf -auto-approve

      - name: Phase 2 — VPC
        run: terraform apply -target=vpc.tf -auto-approve

      - name: Phase 3 — EKS
        run: terraform apply -target=eks.tf -auto-approve

      - name: Phase 4 — IAM
        run: terraform apply -target=iam.tf -auto-approve
      - name: Phase 5 — Karpenter
        run: terraform apply -target=karpenter.tf -auto-approve

     # - name: Phase 6 — Remaining Addons
     #   run: terraform apply -auto-approve
