name: "EKS Infrastructure Pipeline"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

# GLOBAL FIX: Ab saare steps automatic aapke "Terraform" folder ke andar chalenge
defaults:
  run:
    working-directory: ./Terraform

jobs:
  terraform_deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "latest"
          terraform_wrapper: false # Wrapper band taake binary directly execute ho

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      # 🟢 Apply Step (Bina import locks ke sukoon se chalega)
      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve

      # 🟢 AUTOMATED FORCE-UNLOCK: Agar pipeline cancel ho ya fail ho, lock khud release hoga
      - name: Force Unlock on Cancellation or Failure
        if: ${{ cancelled() || failure() }}
        run: |
          echo "Pipeline stop ya fail hui hai. State lock check kar ke break kar rahe hain..."
          
          # State info se lock ki ID nikalne ki koshish (JSON format parsing)
          # Agar lock laga hua mila, toh use force-unlock kar diya jayega
          LOCK_ID=$(terraform providers lock 2>&1 | grep -oE '[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}' | head -n 1 || true)
          
          if [ ! -z "$LOCK_ID" ]; then
            echo "Lock ID mili: $LOCK_ID. Unlocking backend state dynamically..."
            terraform force-unlock -force $LOCK_ID
          else
            echo "Koi lock ID nahi mili ya lock pehle hi released hai."
          fi
