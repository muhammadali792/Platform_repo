apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  template:
    metadata:
      labels:
        nodepool: general
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          # Strictly m aur c families jo aap allow karna chahte hain
          values: ["m", "c"]
        - key: karpenter.k8s.aws/instance-generation
          operator: In
          # Strictly 7th generation (m7i, c7i, c7i-flex)
          values: ["7"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          # Pehle 'large' use hoga, zaroorat parne par 'xlarge' banega taake timeout na ho
          values: ["large", "xlarge"]
      expireAfter: 720h
  limits:
    cpu: "100"
    memory: 200Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
