resource "kubectl_manifest" "node_pool_general" {
  yaml_body = <<-YAML
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
  limits:
    cpu: "100"
    memory: 200Gi
  template:
    metadata:
      labels:
        nodepool: general
    spec:
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r", "t"] # 🟢 Compute, Memory, General aur Burstable sab allow kar diye
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"] # 🟢 Sirf purani generation (v4 se pehle ki) block ki hai taake saste naye nodes milein
  YAML
}
